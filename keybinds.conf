###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# ── Terminals & Apps ──────────────────────────────────────────────────
bind = $mainMod, Return,  exec, gnome-terminal  # New terminal
bind = $mainMod, Q,       killactive,           # Close active window
bind = $mainMod, A,       exec, fuzzel          # App launcher
bind = $mainMod, E,       exec, thunar          # File manager
bind = $mainMod, B,       exec, firefox         # Browser

# ── Window State ──────────────────────────────────────────────────────
bind = $mainMod, F,       fullscreen, 0         # Toggle fullscreen
bind = $mainMod, V,       togglefloating,        # Toggle floating
bind = $mainMod, J,       togglesplit,            # Dwindle: toggle split
bind = $mainMod, semicolon, pseudo,               # Dwindle: pseudotile

# ── Session ───────────────────────────────────────────────────────────
bind = $mainMod, L,       exec, hyprlock         # Lock screen
bind = $mainMod, P,       exec, wlogout          # Power menu
bind = $mainMod SHIFT, M, exit,                  # Exit Hyprland

# ── Screenshots ───────────────────────────────────────────────────────
bind = ,       Print,     exec, grim ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod, S,       exec, grim -g "$(slurp)" ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# ── Focus Movement (Arrow keys) ───────────────────────────────────────
bind = $mainMod, left,    movefocus, l
bind = $mainMod, right,   movefocus, r
bind = $mainMod, up,      fullscreen, 1                              # Maximize / restore
bind = $mainMod, down,    movetoworkspacesilent, special:minimized    # Minimize (hide)
bind = $mainMod CTRL, down,  togglespecialworkspace, minimized        # Show minimized windows

# ── Focus Movement (Vim keys) ─────────────────────────────────────────
bind = $mainMod CTRL, H,  movefocus, l
bind = $mainMod CTRL, L,  movefocus, r
bind = $mainMod CTRL, K,  movefocus, u
bind = $mainMod CTRL, J,  movefocus, d

# ── Move Windows ──────────────────────────────────────────────────────
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# ── Resize Windows (hold Super+Alt, tap arrow) ────────────────────────
binde = $mainMod ALT, right, resizeactive,  30  0
binde = $mainMod ALT, left,  resizeactive, -30  0
binde = $mainMod ALT, up,    resizeactive,   0 -30
binde = $mainMod ALT, down,  resizeactive,   0  30

# ── Workspaces 1–10 ───────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ── Move Window to Workspace ──────────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Cycle Workspaces ──────────────────────────────────────────────────
bind = $mainMod, Tab,       workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1

# ── Special Workspace (scratchpad) ────────────────────────────────────
bind = $mainMod,       grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, grave, movetoworkspace,        special:scratchpad

# ── Mouse: Move & Resize ──────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Scroll through workspaces on bar ─────────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Volume (pipewire/wireplumber) ─────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Brightness ────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ── Media Controls ────────────────────────────────────────────────────
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
