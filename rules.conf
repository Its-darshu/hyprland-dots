##############################
### WINDOWS AND WORKSPACES ###
##############################

# ── Global ───────────────────────────────────────────────────────────
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# ── Float specific apps ───────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(file-roller)$
windowrulev2 = float, class:^(gnome-calculator)$
windowrulev2 = float, class:^(galculator)$
windowrulev2 = float, class:^(wlogout)$
windowrulev2 = float, class:^(xdg-desktop-portal)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Open Folder)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Confirm)(.*)$
windowrulev2 = float, title:^(About)(.*)$

# ── Float + center ────────────────────────────────────────────────────
windowrulev2 = float,    class:^(pavucontrol)$
windowrulev2 = size 800 500, class:^(pavucontrol)$
windowrulev2 = center,   class:^(pavucontrol)$

windowrulev2 = float,    class:^(blueman-manager)$
windowrulev2 = size 600 400, class:^(blueman-manager)$
windowrulev2 = center,   class:^(blueman-manager)$

# ── Wlogout (power menu) fullscreen overlay ───────────────────────────
windowrulev2 = fullscreen, class:^(wlogout)$
windowrulev2 = noanim,     class:^(wlogout)$

# ── Picture-in-picture ────────────────────────────────────────────────
windowrulev2 = float,    title:^(Picture-in-Picture)$
windowrulev2 = pin,      title:^(Picture-in-Picture)$
windowrulev2 = size 400 225, title:^(Picture-in-Picture)$
windowrulev2 = move 1500 830, title:^(Picture-in-Picture)$

# ── Workspace assignments (removed — all apps open in current workspace) ──

# ── Opacity ───────────────────────────────────────────────────────────
windowrulev2 = opacity 0.95 0.88, class:^(gnome-terminal-server)$
windowrulev2 = opacity 0.95 0.88, class:^(foot)$
