##############################
### WINDOWS AND WORKSPACES ###
##############################
#
# Hyprland 0.55+ deprecated `windowrulev2` and the old positional matchers.
# New form: windowrule = <effect> <value>, match:<field> <value>[, match:...]

# ── Global ───────────────────────────────────────────────────────────
windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# ── Float specific apps ───────────────────────────────────────────────
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(file-roller)$
windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(wlogout)$
windowrule = float on, match:class ^(xdg-desktop-portal)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Open Folder)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(Confirm)(.*)$
windowrule = float on, match:title ^(About)(.*)$

# ── Float + center ────────────────────────────────────────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = size 800 500, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$

windowrule = float on, match:class ^(blueman-manager)$
windowrule = size 600 400, match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$

# ── Wlogout (power menu) fullscreen overlay ───────────────────────────
windowrule = fullscreen on, match:class ^(wlogout)$
windowrule = no_anim on, match:class ^(wlogout)$

# ── Picture-in-picture ────────────────────────────────────────────────
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = size 400 225, match:title ^(Picture-in-Picture)$
windowrule = move 1500 830, match:title ^(Picture-in-Picture)$

# ── Workspace assignments (removed — all apps open in current workspace) ──

# ── Opacity ───────────────────────────────────────────────────────────
windowrule = opacity 0.95 0.88, match:class ^(gnome-terminal-server)$
windowrule = opacity 0.95 0.88, match:class ^(foot)$
