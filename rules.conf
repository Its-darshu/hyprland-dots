##############################
### WINDOWS AND WORKSPACES ###
##############################

# ── Global ───────────────────────────────────────────────────────────
windowrule = suppressevent maximize, class:.*
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# ── Float specific apps ───────────────────────────────────────────────
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(file-roller)$
windowrule = float, class:^(gnome-calculator)$
windowrule = float, class:^(galculator)$
windowrule = float, class:^(wlogout)$
windowrule = float, class:^(xdg-desktop-portal)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Open Folder)$
windowrule = float, title:^(Save As)$
windowrule = float, title:^(Confirm)(.*)$
windowrule = float, title:^(About)(.*)$

# ── Float + center ────────────────────────────────────────────────────
windowrule = float,  class:^(pavucontrol)$
windowrule = size,   class:^(pavucontrol)$,   800 500
windowrule = center, class:^(pavucontrol)$

windowrule = float,  class:^(blueman-manager)$
windowrule = size,   class:^(blueman-manager)$, 600 400
windowrule = center, class:^(blueman-manager)$

# ── Wlogout (power menu) fullscreen overlay ───────────────────────────
windowrule = fullscreen, class:^(wlogout)$
windowrule = noanim,     class:^(wlogout)$

# ── Picture-in-picture ────────────────────────────────────────────────
windowrule = float,  title:^(Picture-in-Picture)$
windowrule = pin,    title:^(Picture-in-Picture)$
windowrule = size,   title:^(Picture-in-Picture)$, 400 225
windowrule = move,   title:^(Picture-in-Picture)$, 1500 830

# ── Workspace assignments ─────────────────────────────────────────────
windowrule = workspace 2, class:^(firefox)$
windowrule = workspace 3, class:^(code)$
windowrule = workspace 3, class:^(codium)$

# ── Opacity ───────────────────────────────────────────────────────────
windowrule = opacity 0.95 0.88, class:^(kitty)$
windowrule = opacity 0.95 0.88, class:^(foot)$
