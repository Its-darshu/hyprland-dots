#################
### AUTOSTART ###
#################

# Status bar — the autohide script owns waybar's lifecycle so its
# show/hide state is always known (prevents inverted-hover desync).
# It starts hidden and reveals on bottom-edge hover.
exec-once = ~/.config/hypr/scripts/waybar-autohide.sh

# Window-switcher daemon (Alt+Tab / Super+Tab). Needs: bash setup-window-tools.sh
exec-once = ~/.config/hypr/scripts/switcher.sh init

# Notifications
exec-once = dunst

# Network tray applet
exec-once = nm-applet --indicator

# Polkit auth agent (try KDE, fallback to GNOME)
exec-once = /usr/lib/polkit-kde-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1

# Wallpaper daemon disabled — set manually with: swww-daemon & swww img /path/to/image.jpg
# exec-once = swww-daemon

# Clipboard manager — two watchers needed for text AND image support
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle daemon (dims/locks after inactivity)
exec-once = hypridle

# Bluetooth
exec-once = blueman-applet

# Open a blank terminal on workspace 1 at startup
exec-once = gnome-terminal
