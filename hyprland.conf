################
### MONITORS ###
################

monitor = , preferred, auto, 1


###################
### MY PROGRAMS ###
###################

$terminal   = gnome-terminal
$fileManager = thunar
$menu       = fuzzel
$locker     = hyprlock
$powermenu  = wlogout


#################
### AUTOSTART ###
#################

source = ~/.config/hypr/autostart.conf


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = XCURSOR_THEME, Adwaita

# Wayland hints for apps
env = GDK_BACKEND, wayland,x11,*
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = MOZ_ENABLE_WAYLAND, 1
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# Fix Java apps on Wayland
env = _JAVA_AWT_WM_NONREPARENTING, 1


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 0
    gaps_out = 0

    border_size = 0

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 0
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(000000cc)
        offset       = 0, 4
    }

    blur {
        enabled    = true
        size       = 8
        passes     = 2
        vibrancy   = 0.0
    }
}

animations {
    enabled = true

    bezier = easeOutExpo,   0.16, 1,    0.3,  1
    bezier = easeInOutBack, 0.68, -0.6, 0.32, 1.6
    bezier = linear,        0,    0,    1,    1
    bezier = quick,         0.15, 0,    0.1,  1

    animation = windows,        1, 5,   easeOutExpo, popin 80%
    animation = windowsIn,      1, 4,   easeOutExpo, popin 80%
    animation = windowsOut,     1, 2,   quick,       popin 80%
    animation = border,         1, 8,   easeOutExpo
    animation = fade,           1, 4,   easeOutExpo
    animation = workspaces,     1, 5,   easeOutExpo, slide
    animation = workspacesIn,   1, 5,   easeOutExpo, slide
    animation = workspacesOut,  1, 5,   easeOutExpo, slide
    animation = layers,         1, 4,   easeOutExpo, fade
}

dwindle {
    preserve_split = true
    force_split    = 1
}

master {
    new_status = slave
}

misc {
    force_default_wallpaper   = 0
    disable_hyprland_logo     = true
    disable_splash_rendering  = true
    background_color         = 0x000000
    vrr                      = 0
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity  = 1.0

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        disable_while_typing = true
    }
}

# Hyprland 0.55+ moved workspace swipe out of input:touchpad into the
# `gesture` keyword (fingers, direction, action). Tuning stays in `gestures`.
gesture = 3, horizontal, workspace

gestures {
    workspace_swipe_distance     = 300
    workspace_swipe_cancel_ratio = 0.3
    workspace_swipe_invert       = false
}


####################
### KEYBINDINGS  ###
####################

source = ~/.config/hypr/keybinds.conf


############################
### WINDOWS & WORKSPACES ###
############################

source = ~/.config/hypr/rules.conf


###################
### LAYER RULES ###
###################

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace fuzzel
layerrule = ignore_alpha 0, match:namespace fuzzel
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
