################
### MONITORS ###
################

monitor = , preferred, auto, auto


###################
### MY PROGRAMS ###
###################

$terminal   = kitty
$fileManager = thunar
$menu       = fuzzel
$locker     = hyprlock
$powermenu  = wlogout


#################
### AUTOSTART ###
#################

source = ~/.config/hypr/autostart.conf


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = XCURSOR_THEME, Adwaita

# Wayland hints for apps
env = GDK_BACKEND, wayland,x11,*
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = MOZ_ENABLE_WAYLAND, 1
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# Fix Java apps on Wayland
env = _JAVA_AWT_WM_NONREPARENTING, 1


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 4
    gaps_out = 8

    border_size = 2

    # Cyan to purple gradient on active window
    col.active_border   = rgba(89dcebee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(313244aa)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 12
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(1e1e2ecc)
        offset       = 0, 4
    }

    blur {
        enabled    = true
        size       = 8
        passes     = 2
        vibrancy   = 0.20
        new_optimizations = true
    }
}

animations {
    enabled = true

    bezier = easeOutExpo,   0.16, 1,    0.3,  1
    bezier = easeInOutBack, 0.68, -0.6, 0.32, 1.6
    bezier = linear,        0,    0,    1,    1
    bezier = quick,         0.15, 0,    0.1,  1

    animation = windows,        1, 5,   easeOutExpo, popin 80%
    animation = windowsIn,      1, 4,   easeOutExpo, popin 80%
    animation = windowsOut,     1, 2,   quick,       popin 80%
    animation = border,         1, 8,   easeOutExpo
    animation = fade,           1, 4,   easeOutExpo
    animation = workspaces,     1, 5,   easeOutExpo, slide
    animation = workspacesIn,   1, 5,   easeOutExpo, slide
    animation = workspacesOut,  1, 5,   easeOutExpo, slide
    animation = layers,         1, 4,   easeOutExpo, fade
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
}

master {
    new_status = slave
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    vfr                     = true
    vrr                     = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        drag_lock         = true
        disable_while_typing = true
    }
}

gestures {
    workspace_swipe         = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert  = false
    workspace_swipe_cancel_ratio = 0.3
}


####################
### KEYBINDINGS  ###
####################

source = ~/.config/hypr/keybinds.conf


############################
### WINDOWS & WORKSPACES ###
############################

source = ~/.config/hypr/rules.conf


###################
### LAYER RULES ###
###################

layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, fuzzel
layerrule = ignorezero, fuzzel
layerrule = blur, notifications
layerrule = ignorezero, notifications
